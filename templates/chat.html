<!DOCTYPE html>
<html>
<head>
<title>Chaitanyaa University Chatbot</title>

<style>
body {
  margin: 0;
    padding: 0;
}

/* Background Image */
body::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

     opacity: 0.15;   /* 🔥 makes image LIGHT */
    z-index: -1;


  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #f4f7ff;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* Top bar */
.topbar {
  background: #0f172a;
  color: white;
  padding: 14px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.topbar h2 {
  margin: 0;
  font-size: 18px;
}

.topbar a {
  color: white;
  text-decoration: none;
  margin-left: 15px;
  font-size: 14px;
}

.topbar a:hover {
  text-decoration: underline;
}

/* Chat container */
.chat-wrapper {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;

  position: relative;
  overflow: hidden;
}

/* 🔥 Background Image */
.chat-wrapper::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background: url("/static/graduation_image.jpg") no-repeat center center;
  background-size: cover;

  z-index: 0;
}

/* 🔥 Light overlay (ONLY affects image) */
.chat-wrapper::after {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background: rgba(255, 255, 255, 0.6);  /* 🔥 CONTROL LIGHTNESS HERE */

  z-index: 1;
}

/* 🔥 Chatbot (NO EFFECT from background) */
.chat-container {
  width: 420px;
  height: 620px;

  background: rgba(255, 255, 255, 0.85);  /* slight glass */
  backdrop-filter: blur(8px);

  border-radius: 18px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.15);

  display: flex;
  flex-direction: column;
  overflow: hidden;

  position: relative;
  z-index: 2;
}

/* Header */
.chat-header {
  background: linear-gradient(45deg, #4f7cff, #6a5acd);
  color: white;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

/* Language dropdown */
.language-bar {
  padding: 8px;
  text-align: center;
  border-bottom: 1px solid #eee;
}

.language-bar select {
  padding: 6px 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 14px;
}

/* Chat messages */
#chatbox {
  flex: 1;
  padding: 15px;
  overflow-y: auto;

  background: url("/static/bg.png") no-repeat center center;
  background-size: cover;
  opacity: 0.85; 
  position: relative;
}


/* Message bubbles */
.message {
  max-width: 75%;
  padding: 10px 14px;
  border-radius: 12px;
  margin: 8px 0;
  font-size: 14px;
}

.user {
  background: #4f7cff;
  color: white;
  margin-left: auto;
}

.bot {
  background: #e5e7eb;
}

/* Input area */
.input-area {
  display: flex;
  padding: 10px;
  border-top: 1px solid #ddd;
}

.input-area input {
  flex: 1;
  padding: 12px;
  border-radius: 20px;
  border: 1px solid #ccc;
  outline: none;
}

.input-area button {
  margin-left: 8px;
  padding: 10px 18px;
  border: none;
  background: #4f7cff;
  color: white;
  border-radius: 20px;
  cursor: pointer;
}

.input-area button:hover {
  background: #3b63d1;
}

/* 🎵 Wave container */
.wave-container {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-top: 5px;
}

/* 🎵 Bars */
.wave-container span {
  display: inline-block;
  width: 4px;
  height: 10px;
  margin: 0 3px;
  background: #4f7cff;
  border-radius: 2px;
  animation: wave 1s infinite ease-in-out;
}

/* 🎵 Different delays for wave effect */
.wave-container span:nth-child(1) { animation-delay: 0s; }
.wave-container span:nth-child(2) { animation-delay: 0.2s; }
.wave-container span:nth-child(3) { animation-delay: 0.4s; }
.wave-container span:nth-child(4) { animation-delay: 0.2s; }
.wave-container span:nth-child(5) { animation-delay: 0s; }

/* 🎵 Animation */
@keyframes wave {
  0%, 100% { height: 10px; }
  50% { height: 25px; }
}

</style>
</head>

<body>

<!-- 🔹 TOP BAR -->
<div class="topbar">
  <h2>🎓 Chaitanyaa Deemed to be University</h2>
  <a href="/logout" style="color:red;">Logout</a>
</div>

<div class="chat-wrapper">
  <div class="chat-container">

    <div class="chat-header">
      College Enquiry AI Chatbot 🤖
    </div>

    <!-- 🔹 LANGUAGE DROPDOWN -->
    <div class="language-bar">
      <select id="language" onchange="changeLanguage()">
        <option value="english">English</option>
        <option value="telugu">Telugu</option>
        <option value="hindi">Hindi</option>
      </select>
    </div>

    <!-- 🔹 CHAT AREA -->
    <div id="chatbox">
      <div class="message bot">
        Hello 👋 Welcome to Chaitanya Deemed to be University! How can I help you?
      </div>
    </div>

    <!-- 🔹 INPUT -->
    <div class="input-area">
      <input type="text" id="message" placeholder="Ask your query here...">
      <button id="micBtn" onclick="startVoice()"title="speak">🎙️
    </button>
    <div id="voiceWave" class="wave-container" style="display:none;">
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
</div>
      <button onclick="sendMessage()">➤</button>
    </div>

  </div>
</div>

<script>

// 🔹 Send message
function sendMessage() {
    let input = document.getElementById("message");
    let userText = input.value.trim();

    if (userText === "") return;

    let chatbox = document.getElementById("chatbox");

    // User message
    chatbox.innerHTML += `<div class="message user">${userText}</div>`;

    fetch("/get", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: userText })
    })
    .then(res => res.json())
    .then(data => {
        chatbox.innerHTML += `<div class="message bot">${data.reply}</div>`;
        chatbox.scrollTop = chatbox.scrollHeight;
    })
    .catch(() => {
        chatbox.innerHTML += `<div class="message bot">⚠️ Server error</div>`;
    });

    input.value = "";
}

// 🔹 Language change (NO RELOAD)
function changeLanguage() {
    let lang = document.getElementById("language").value;

    fetch("/set_language", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ language: lang })
    });
}

// 🔹 Enter key
document.getElementById("message").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});

// 🎤 Voice Recognition
function startVoice() {

    // ✅ Check browser support
    if (!('webkitSpeechRecognition' in window)) {
        alert("❌ Use Google Chrome browser for voice feature");
        return;
    }

    const recognition = new webkitSpeechRecognition();

    // 🔥 Get language dynamically
    recognition.lang = getVoiceLang();

    recognition.continuous = false;
    recognition.interimResults = false;

    const micBtn = document.getElementById("micBtn");
    const wave = document.getElementById("voiceWave");     // 🎶 wave
    const status = document.getElementById("voiceStatus"); // 🎤 text

    recognition.start();

    // 🔴 START EFFECTS
    micBtn.classList.add("listening");
    if (wave) wave.style.display = "flex";
    if (status) status.innerText = "🎤 Listening...";

    recognition.onresult = function (event) {

        let voiceText = event.results[0][0].transcript;

        console.log("Voice:", voiceText);

        document.getElementById("message").value = voiceText;

        // 🛑 STOP EFFECTS
        micBtn.classList.remove("listening");
        if (wave) wave.style.display = "none";
        if (status) status.innerText = "";

        sendMessage();
    };

    recognition.onerror = function (event) {
        console.log("Error:", event.error);

        // 🛑 STOP EFFECTS
        micBtn.classList.remove("listening");
        if (wave) wave.style.display = "none";
        if (status) status.innerText = "";

        alert("Voice error: " + event.error);
    };

    recognition.onend = function () {
        micBtn.classList.remove("listening");
        if (wave) wave.style.display = "none";
        if (status) status.innerText = "";
    };
}


// 🌐 Language detection
function getVoiceLang() {

    let lang = document.getElementById("language").value;

    if (lang === "telugu") return "te-IN";
    if (lang === "hindi") return "hi-IN";

    return "en-IN";
}

</script>

</body>
</html>
