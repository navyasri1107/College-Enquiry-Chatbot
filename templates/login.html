<!DOCTYPE html>
<html>
<head>
    <title>Login - Chaitanya Deemed to be University</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-image: url("{{ url_for('static', filename='chaitanya.jpg') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.6);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .college-name {
            color: white;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }

        .container {
            background: white;
            width: 350px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .container h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 12px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        .extra-links {
            text-align: center;
            margin-top: 15px;
        }

        .extra-links a {
            text-decoration: none;
            color: #0072ff;
            display: block;
            margin-top: 5px;
        }

    </style>
</head>

<body>

<div class="overlay">

    <div class="college-name">
        Chaitanya Deemed to be University
    </div>

    <div class="container">
        <h2>Login</h2>
        <form method="POST" action="/login">

    <input type="email" name="email" placeholder="Email Address" required>

    <input type="password" name="password" placeholder="Password" required>

    {% if error %}
  <div style="color:red; text-align:center; margin-bottom:10px;">
    {{ error }}
  </div>
{% endif %}

    <button type="submit">Login</button>

</form>

        <div class="extra-links">
            <a href="/forgot">Forgot Password?</a>
            <a href="/register">Don't have an account.Register</a>
        </div>
    </div>

</div>

</body>
</html>
