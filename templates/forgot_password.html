<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password - Chaitanya Deemed to be University</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-image: url("{{ url_for('static', filename='chaitanya.jpg') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .overlay {
            background: rgba(0,0,0,0.6);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .college-name {
            color: white;
            font-size: 30px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .container {
            background: white;
            width: 350px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        .back-link {
            text-align: center;
            margin-top: 15px;
        }

        .back-link a {
            text-decoration: none;
            color: #0072ff;
        }
    </style>
</head>

<body>

<div class="overlay">

    <div class="college-name">
        Chaitanya Deemed to be University
    </div>

    <div class="container">
        <h2>Reset Password</h2>

        <form method="POST" action="/forgot_password">

            <input type="email" name="email" placeholder="Enter Registered Email" required>

            <input type="password" name="new_password" placeholder="Enter New Password" required>
             
            <!-- 🔥 SUCCESS MESSAGE -->
{% if success %}
  <div style="color:green; text-align:center; margin-bottom:10px;">
    {{ success }}
  </div>
{% endif %}

<!-- 🔥 ERROR MESSAGE -->
{% if error %}
  <div style="color:red; text-align:center; margin-bottom:10px;">
    {{ error }}
  </div>
{% endif %}
            <button type="submit">Reset Password</button>

        </form>

        <div class="back-link">
            <a href="/login">Back to Login</a>
        </div>
    </div>

</div>

</body>
</html>
